<div class="inner_page_css main_dashboard_css">
  <!-- Content Header (Page header) -->

  <section class="container-fluid">
    <div class="row">
      <div class="col-md-12">
        <div class="main_card_form">
          <div class="main_header">
            <div class="header_title">Active-Inactive</div>
          </div>

          <div class="box-body">
            <div>
              <div class="d_flex flex_End dsr-fillters" style="float: unset !important;">
                <button class="btn btn-info1" role="tab" id="headingOne" data-toggle="collapse" data-parent="#accordion"
                  href="#collapseOne" aria-expanded="true" aria-controls="collapseOne">
                  <a role="button" class="fa fa-filter"><span>Filters</span><i
                      class="fa fa-angle-down pull-right"></i></a>
                </button>
              </div>



              <div id="collapseOne" class="panel-collapse collapse" role="tabpanel" aria-labelledby="headingOne">
                <div class="panel-body">
                  <!-- filter  -->
                  <app-square-filter (postCreated)="SearchData($event)"></app-square-filter>
                </div>
              </div>


              <div class="mydiv">
                <div class="custom_table tables_layout_design">
                  <table datatable [dtOptions]="dtOptions" id="Table1" class="row-border table">
                    <thead>
                      <tr>
                        <th></th>
                      </tr>
                    </thead>
                  </table>

                  <ul class="responsive-table" *ngIf="dataAr?.length != 0">
                    <li class="table-row tablerow{{(i % 10) + 1}}" *ngFor="let row of dataAr; let i=index;">
                      <div class="d_flex w_100 flex_Equal px_10 pb_10 flex_colum_sm mt15">
                        <div class="agents_data agents_data1">
                          <div class="icon_re_cl">{{row.SrNo}}</div>
                          <div class="agent_name_mobile">
                            <div class="agent_data">
                              
                              <div>Name </div>
                              <strong class="fs_18">{{row.AgentName}} </strong>
                          </div>
                          </div>
                        </div>
                        <div class="agents_data agents_data2">
                          <div class="agent_name_mobile">
                            <div class="agent_data">
                              <div>RM</div>
                              <strong class="fs_18" id="emailToCopy">{{row.RmName}}</strong>
                            </div>
                          </div>
                        </div>
                        <div class="agents_data agents_data3" *ngIf="row.Department != ''">
                          <div class="agent_name_mobile">
                            <div class="agent_data">
                              <div>Department</div>
                              <strong class="fs_18">{{row.Department}}</strong>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div class="last_row">
                        <div class="effective_date">
                          <div class="d_flex">
                            <div *ngIf="row.CreateDate != ''"style="margin-right:10px;">Create Date : {{row.CreateDate}}</div>
                            <div *ngIf="row.SrCount != ''"style="margin-right:10px;">Sr Count : {{row.SrCount}}</div>
                            <div *ngIf="row.Business != ''">Business : {{row.Business}}</div>
                          </div>
                        </div>
                        <div class="col_2 action_btn d_flex flex_Middel box-bottom">
                          
                        </div>
                      </div>
                    </li>
                  </ul>

                  <div class="row" *ngIf="dataAr?.length == 0">
                    <div class="col-md-12">
                      <div class="no_data_found">
                        <span><img src="assets/image/no_data_banner.jpg"></span>
                        <small>No data available !</small>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

  </section>


</div>
